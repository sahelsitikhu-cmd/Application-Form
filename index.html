<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply Now</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <a href="form.html" class="active">Apply Now</a>
        <a href="data.html">View Applications</a>
    </nav> <br>

    <div class="container">
        <h1>Institution Application Form</h1>
        <form id="applicationForm">
            <div class="form-group">
                <label>Full Name:</label>
                <input type="text" id="name" placeholder="Enter your full name" required>
            </div>

            <div class="form-group">
                <label>Date of Birth:</label>
                <input type="date" id="dob" required>
            </div>

            <div class="gender-group">
                <label>Gender:</label>
                <input type="radio" name="gender" value="Male" checked> Male
                <input type="radio" name="gender" value="Female"> Female
                <input type="radio" name="gender" value="Others"> Others
            </div>

            <div class="form-group">
                <label>Email Address:</label>
                <input type="email" id="email" placeholder="example@gmail.com" required>
            </div>

            <div class="form-group">
                <label>Phone Number:</label>
                <input type="tel" id="phone" placeholder="98XXXXXXXX" required>
            </div>

            <div class="form-group">
                <label>Address:</label>
                <input type="text" id="address" placeholder="Enter your address" required>
            </div>

            <div class="form-group">
                <label>SEE Marking:</label>
                <select id="seeType" onchange="updatePlaceholder('seeScore', this.value)">
                    <option value="GPA">GPA</option>
                    <option value="Percentage">Percentage</option>
                </select>
            </div>
            <div class="form-group">
                <label>SEE Score:</label>
                <input type="number" id="seeScore" step="0.01" placeholder="Enter GPA (0-4)" required>
            </div>

            <div class="form-group">
                <label>+2 Marking:</label>
                <select id="plusTwoType" onchange="updatePlaceholder('plusTwoScore', this.value)">
                    <option value="GPA">GPA</option>
                    <option value="Percentage">Percentage</option>
                </select>
            </div>
            <div class="form-group">
                <label>+2 Score:</label>
                <input type="number" id="plusTwoScore" step="0.01" placeholder="Enter GPA (0-4)" required>
            </div>

            <div class="form-group">
                <label>CMAT Score:</label>
                <input type="number" id="cmat" min="0" max="100" required>
            </div>

            <div class="form-group">
                <label>Program:</label>
                <select id="program" required>
                    <option value="">--Select Program--</option>
                    <option>Bachelor in Business Management</option>
                    <option>Bachelor in Business Administration</option>
                    <option>Bachelor in Information Management</option>
                    </select>
            </div>

            <button type="submit">Submit Application</button>
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
