<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Institution Application Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="active">Apply Now</a>
        <a href="data.html">View Applications</a>
    </nav><br>
    <div class="container">
        <h1>Institution Application Form</h1>
        <form id="applicationForm">
            <label>Full Name:</label>
            <input type="text" id="name" required><br>

            <label>Date of Birth:</label>
            <input type="date" id="dob" required><br>

            <label>Gender:</label>
            <input type="radio" name="gender" value="Male" required>Male
            <input type="radio" name="gender" value="Female">Female
            <input type="radio" name="gender" value="Others">Others
            <br>

            <label>Email Address:</label>
            <input type="email" id="email" required><br>

            <label>Phone Number:</label>
            <input type="tel" id="phone" required><br>

            <label>Address:</label>
            <input type="text" id="address" required><br>

            <label>SEE GPA:</label>
            <input type="number" id="seeGpa" step="0.01" min="0" max="4" required><br>

            <label>+2 GPA:</label>
            <input type="number" id="plusTwoGpa" step="0.01" min="0" max="4" required><br>

            <label>CMAT Score:</label>
            <input type="number" id="cmat" min="0" max="100" required><br>

            <label>Program Applying For:</label>
            <select id="program" required>
                <option value="">--Select Program--</option>
                <option>Bachelor in Computer Science</option>
                <option>Bachelor in Computer Applications</option>
                <option>Bachelor in Information Technology</option>
                <option>Bachelor in Information Management</option>
            </select><br>

            <button type="submit">Submit Application</button>
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
